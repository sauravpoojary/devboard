spring:
  application:
    name: devboard
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    com.poojarysaurav.devboard: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000   # 24 hours in milliseconds
